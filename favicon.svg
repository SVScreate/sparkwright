<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="60" height="60" rx="12" fill="#0c0c18"/>
  <!-- Sparkler mark — 8-arm favicon version -->
  <g filter="url(#glow)">
    <line x1="30" y1="30" x2="30" y2="7"  stroke="#fff8e0" stroke-width="2.0" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="48" y2="12" stroke="#ffd93d" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="53" y2="30" stroke="#fff0aa" stroke-width="1.9" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="48" y2="48" stroke="#ffb347" stroke-width="1.7" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="30" y2="53" stroke="#ffd93d" stroke-width="2.0" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="12" y2="48" stroke="#ff9f43" stroke-width="1.7" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="7"  y2="30" stroke="#ffd93d" stroke-width="1.9" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="12" y2="12" stroke="#fff0aa" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Core -->
    <circle cx="30" cy="30" r="4.5" fill="#fffde0"/>
    <circle cx="30" cy="30" r="2.2" fill="#ffffff" opacity="0.95"/>
  </g>
</svg>
