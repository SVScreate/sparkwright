<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fact Catcher — Mockup</title>
<style>
  :root {
    --bg: #0a0614; --surface: #130d24;
    --faint: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.12);
    --text: #e8e0ff; --muted: rgba(232,224,255,0.45);
    --a1: #ff6b6b; --a2: #ffd93d; --a3: #6bcb77; --a4: #4d96ff; --a5: #c77dff;
    --correct: #6bcb77; --wrong: #ff6b6b;
    --font-display: 'Georgia', serif; --font-body: system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-body);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px 16px 40px; gap: 14px;
  }

  .controls-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    justify-content: center; width: 100%; max-width: 560px;
    padding: 10px 16px; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 12px;
    font-size: 0.8rem; color: var(--muted);
  }
  .controls-bar strong { color: var(--text); }
  .controls-bar label { display: flex; align-items: center; gap: 5px; }
  .controls-bar input[type=text] {
    width: 60px; background: transparent; border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); text-align: center; font-size: 0.85rem; padding: 2px 4px;
  }
  .ctrl-btn {
    background: rgba(199,125,255,0.15); border: 1px solid var(--a5); color: var(--a5);
    border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 0.8rem; font-weight: 700;
  }
  .ctrl-btn:hover { background: rgba(199,125,255,0.28); }
  .ctrl-sep { color: var(--border); }

  /* PQ chrome */
  .quest-badge-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; max-width: 560px; }
  .remed-badge { background: rgba(255,217,61,0.15); border: 1px solid var(--a2); color: var(--a2); border-radius: 20px; padding: 4px 14px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; }
  .remed-dots { display: flex; gap: 6px; }
  .rdot { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); border: 1px solid var(--border); }
  .rdot.done { background: var(--correct); border-color: var(--correct); }
  .rdot.now  { background: var(--a2); border-color: var(--a2); transform: scale(1.3); }

  .remed-body { width: 100%; max-width: 560px; display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 0 0 8px; }

  /* ── Fact Catcher ── */
  .fc-container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 8px; }
  .fc-hud { display: flex; align-items: center; gap: 8px; padding: 0 2px; }
  .fc-progress { font-size: 1.4rem; flex-shrink: 0; min-width: 4.8rem; letter-spacing: 2px; }
  .fc-hud-label { flex: 1; text-align: center; font-family: var(--font-display); font-size: 1rem; color: var(--a5); font-weight: 700; }
  .fc-timer-wrap { width: 70px; height: 7px; background: var(--faint); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
  .fc-timer-bar { height: 100%; width: 100%; background: var(--a4); border-radius: 4px; transition: width 0.1s linear, background 0.3s; }
  .fc-timer-bar.urgent { background: var(--wrong); }

  .fc-feedback { text-align: center; font-size: 0.82rem; font-weight: 700; min-height: 1.1em; color: transparent; transition: color 0.15s; }
  .fc-feedback.fc-fb-good  { color: var(--correct); }
  .fc-star { display: inline-block; }
  .fc-star-lost { color: var(--wrong); display: inline-block; animation: fc-star-lost-anim 0.42s ease-out forwards; }
  @keyframes fc-star-lost-anim {
    0%  { transform: scale(1.4); opacity: 1; }
    55% { transform: scale(1.0); opacity: 0.7; }
    100%{ transform: scale(0.3); opacity: 0; }
  }

  .fc-target-banner { text-align: center; flex-shrink: 0; font-family: var(--font-display); font-size: 1.3rem; color: var(--a2); background: rgba(255,217,61,0.1); border: 1.5px solid rgba(255,217,61,0.3); border-radius: 8px; padding: 6px 20px; white-space: nowrap; }

  .fc-field { position: relative; width: 100%; height: 360px; background: rgba(16,10,32,0.75); border: 1.5px solid rgba(199,125,255,0.2); border-radius: 14px; overflow: hidden; }
  .fc-lane-div { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.05); }

  .fc-card { position: absolute; transform: translateX(-50%); font-family: var(--font-display); font-size: 1.05rem; padding: 10px 16px; border-radius: 10px; border: 2px solid; white-space: nowrap; pointer-events: none; user-select: none; background: rgba(255,255,255,0.07); border-color: rgba(199,125,255,0.35); color: var(--text); }

  .fc-catcher { position: absolute; bottom: 8px; font-size: 2.6rem; transform: translateX(-50%); transition: left 0.1s cubic-bezier(0.25,0.1,0.25,1); pointer-events: none; user-select: none; }
  @keyframes fc-flash-good-anim { 0%,100%{filter:brightness(1)} 35%{filter:drop-shadow(0 0 16px rgba(107,203,119,0.9)) brightness(1.6)} }
  @keyframes fc-flash-bad-anim  { 0%,100%{filter:brightness(1)} 35%{filter:drop-shadow(0 0 16px rgba(255,107,107,0.9)) brightness(1.4)} }
  .fc-catcher.flash-good { animation: fc-flash-good-anim 0.4s ease-out; }
  .fc-catcher.flash-bad  { animation: fc-flash-bad-anim  0.4s ease-out; }

  .fc-wrong-flash { position: absolute; transform: translateX(-50%); font-family: var(--font-display); font-size: 1.05rem; padding: 10px 16px; border-radius: 10px; border: 2px solid var(--wrong); background: rgba(255,107,107,0.22); color: var(--wrong); white-space: nowrap; pointer-events: none; z-index: 10; animation: fc-wrong-shake 1s ease-out forwards; }
  @keyframes fc-wrong-shake {
    0%  {transform:translateX(-50%) scale(1.05);opacity:1}
    10% {transform:translateX(calc(-50% + 10px)) scale(1.05)}
    22% {transform:translateX(calc(-50% - 10px))}
    34% {transform:translateX(calc(-50% + 7px))}
    46% {transform:translateX(calc(-50% - 7px))}
    58% {transform:translateX(calc(-50% + 3px))}
    70% {transform:translateX(-50%)}
    88% {opacity:1}
    100%{transform:translateX(-50%) scale(0.85);opacity:0}
  }
  .fc-correct-pop { position: absolute; transform: translateX(-50%); font-family: var(--font-display); font-size: 1.05rem; padding: 10px 16px; border-radius: 10px; border: 2px solid var(--correct); background: rgba(107,203,119,0.22); color: var(--correct); white-space: nowrap; pointer-events: none; z-index: 10; animation: fc-correct-pop-anim 0.8s ease-out forwards; }
  @keyframes fc-correct-pop-anim {
    0%  {transform:translateX(-50%) scale(0.7);opacity:0}
    25% {transform:translateX(-50%) scale(1.2);opacity:1}
    55% {transform:translateX(-50%) scale(1);opacity:1}
    100%{transform:translateX(-50%) translateY(-55px) scale(0.85);opacity:0}
  }
  .fc-result { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.6rem; color: var(--a2); background: rgba(10,6,24,0.88); border-radius: 12px; z-index: 5; }
  .fc-instr { text-align: center; font-size: 0.72rem; color: var(--muted); }

  .remed-cont-btn { font-family: var(--font-display); font-size: 1.3rem; padding: 14px 48px; border: none; border-radius: 20px; cursor: pointer; background: linear-gradient(135deg, var(--a4), var(--a5)); color: white; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; transform: translateY(4px); }
  .remed-cont-btn.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

  .state-hint { font-size: 0.75rem; color: var(--muted); text-align: center; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; }
  .state-hint span { color: var(--a4); font-weight: 700; }
</style>
</head>
<body>

<div class="controls-bar">
  <strong>Fact Catcher — Mockup</strong>
  <span class="ctrl-sep">|</span>
  <label>Avatar: <input type="text" id="avatar-input" value="🐉"></label>
  <label>Fact: <input type="text" id="fact-input" value="7 × 4" style="width:72px"></label>
  <span class="ctrl-sep">|</span>
  <button class="ctrl-btn" onclick="restartMockup()">↺ Restart</button>
  <button class="ctrl-btn" onclick="skipToWin()">⭐ Win</button>
  <button class="ctrl-btn" onclick="skipToTimeout()">⏱ Timeout</button>
</div>

<div class="quest-badge-wrap">
  <div class="remed-badge">⚡ Practice Quest</div>
  <div class="remed-dots">
    <div class="rdot done"></div><div class="rdot now"></div>
    <div class="rdot"></div><div class="rdot"></div>
  </div>
</div>

<div class="remed-body" id="remed-body"></div>
<div class="state-hint" id="state-hint">← → arrow keys or mouse to move</div>

<script>
var WIN_COUNT = 5;
var INACTIVITY_MS = 18000;
var CORRECT_COOLDOWN = 3500;

function parseFact(str) {
  var m = str.replace(/[×x\*]/g,'×').match(/(\d+)\s*×\s*(\d+)/);
  if (!m) return {fa:7,fb:4,a:28};
  var fa=parseInt(m[1]),fb=parseInt(m[2]);
  return {fa:fa,fb:fb,a:fa*fb};
}

var S = {};
function sh(a){ var r=a.slice(); for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=r[i];r[i]=r[j];r[j]=t;} return r; }

function initState() {
  var f = parseFact(document.getElementById('fact-input').value);
  var avatar = document.getElementById('avatar-input').value.trim() || '⭐';
  var fa=f.fa,fb=f.fb,fc=f.a;

  var correct = [fa+'×'+fb+'='+fc, fb+'×'+fa+'='+fc, fc+'='+fa+'×'+fb, fc+'='+fb+'×'+fa].map(function(s){return s.replace(/×/g,' × ').replace(/=/g,' = ');});
  var dist = [];
  [-4,-3,-2,-1,1,2,3,4].forEach(function(d){var wa=fc+d; if(wa>0){dist.push(fa+' × '+fb+' = '+wa); dist.push(fc+' = '+(fa+1)+' × '+(fb-1));}});
  [-2,-1,1,2].forEach(function(d){
    if(fa+d>0) dist.push((fa+d)+' × '+fb+' = '+fc);
    if(fb+d>0) dist.push(fa+' × '+(fb+d)+' = '+fc);
    if(fa+d>0) dist.push(fc+' = '+(fa+d)+' × '+fb);
  });
  var uniqueDist = dist.filter(function(d,i,arr){return arr.indexOf(d)===i;});

  S = {
    fa:fa, fb:fb, fc:fc, avatar:avatar,
    target: fa+' × '+fb+' = '+fc,
    correctPool: sh(correct), distractorPool: sh(uniqueDist),
    cIdx: 0, dIdx: 0,
    lane: 1, caught: 0,
    done: false, frozen: false,
    cards: [],
    lastCorrectLane: -1,
    lastCorrectCaughtTime: 0,
    lastActivityTime: Date.now(),
    spawnT: null, loopT: null,
  };
}

function buildHTML() {
  document.getElementById('remed-body').innerHTML =
    '<div class="fc-container">'+
      '<div class="fc-hud">'+
        '<div class="fc-progress" id="fc-prog">☆☆☆☆☆</div>'+
        '<div class="fc-hud-label">Fact Catcher</div>'+
        '<div class="fc-timer-wrap"><div class="fc-timer-bar" id="fc-timer"></div></div>'+
      '</div>'+
      '<div class="fc-feedback" id="fc-feedback"></div>'+
      '<div class="fc-target-banner">'+S.target+'</div>'+
      '<div class="fc-field" id="fc-field">'+
        '<div class="fc-lane-div" style="left:33.33%"></div>'+
        '<div class="fc-lane-div" style="left:66.66%"></div>'+
        '<div class="fc-catcher" id="fc-catcher">'+S.avatar+'</div>'+
      '</div>'+
      '<div class="fc-instr">← → or mouse to move · catch the correct facts!</div>'+
    '</div>'+
    '<button class="remed-cont-btn" id="next-btn" onclick="alert(\'Advances to next PQ step!\')">Next →</button>';
  setTimeout(function(){setLane(1);},10);
  renderProg(); renderTimer();
}

function fw(){var f=document.getElementById('fc-field');return f?(f.offsetWidth||320):320;}
function fh(){var f=document.getElementById('fc-field');return f?(f.offsetHeight||360):360;}
function lcx(l){return Math.round(fw()/3*l+fw()/6);}

function setLane(l){
  var nl=Math.max(0,Math.min(2,l));
  if(nl!==S.lane) S.lastActivityTime=Date.now();
  S.lane=nl;
  var c=document.getElementById('fc-catcher');
  if(c) c.style.left=lcx(S.lane)+'px';
}
function renderProg(){
  var el=document.getElementById('fc-prog'); if(!el) return;
  var html='';
  for(var i=0;i<WIN_COUNT;i++) html+='<span class="fc-star" id="fc-star-'+i+'">'+(i<S.caught?'⭐':'☆')+'</span>';
  el.innerHTML=html;
}
function renderTimer(){
  var b=document.getElementById('fc-timer'); if(!b) return;
  var pct=Math.max(0,1-(Date.now()-S.lastActivityTime)/INACTIVITY_MS);
  b.style.width=(pct*100)+'%';
  if(pct<0.25) b.classList.add('urgent'); else b.classList.remove('urgent');
}
function showFeedback(msg,type){
  var el=document.getElementById('fc-feedback'); if(!el) return;
  el.textContent=msg; el.className='fc-feedback '+(type==='wrong'?'fc-fb-wrong':'fc-fb-good');
  setTimeout(function(){var fel=document.getElementById('fc-feedback'); if(fel){fel.textContent='';fel.className='fc-feedback';}},1800);
}
function flashCatcher(type){
  var c=document.getElementById('fc-catcher'); if(!c) return;
  c.classList.remove('flash-good','flash-bad'); void c.offsetWidth;
  c.classList.add(type==='good'?'flash-good':'flash-bad');
  setTimeout(function(){var cc=document.getElementById('fc-catcher');if(cc)cc.classList.remove('flash-good','flash-bad');},420);
}
function hint(msg){var el=document.getElementById('state-hint');if(el)el.innerHTML=msg;}

function endGame(won){
  if(S.done) return; S.done=true;
  clearInterval(S.spawnT); clearInterval(S.loopT);
  S.cards.forEach(function(c){try{c.el.remove();}catch(e){}});
  var res=document.createElement('div'); res.className='fc-result';
  res.textContent=won?'⭐ Great catching!':'Keep going!';
  var field=document.getElementById('fc-field'); if(field) field.appendChild(res);
  var btn=document.getElementById('next-btn'); if(btn) btn.classList.add('show');
  hint(won?'✅ Win — <span>Next →</span> active':'⏱ Inactivity timeout — <span>Next →</span> active');
}

function spawn(){
  if(S.done||S.frozen) return;
  var correctOnScreen=S.cards.some(function(c){return c.isC&&!c.caught&&!c.missed;});
  var cooldownOk=(Date.now()-S.lastCorrectCaughtTime)>CORRECT_COOLDOWN;
  var isC=!correctOnScreen&&cooldownOk&&(Math.random()<0.27);
  var text,lane;
  if(isC){
    text=S.correctPool[S.cIdx%S.correctPool.length]; S.cIdx++;
    var tries=0;
    do{lane=Math.floor(Math.random()*3);tries++;}while(lane===S.lastCorrectLane&&tries<8);
    S.lastCorrectLane=lane;
  } else {
    text=S.distractorPool[S.dIdx%S.distractorPool.length]; S.dIdx++;
    lane=Math.floor(Math.random()*3);
  }
  var ms=2200+Math.random()*500;
  var el=document.createElement('div'); el.className='fc-card';
  el.textContent=text; el.style.left=lcx(lane)+'px'; el.style.top='-56px';
  var field=document.getElementById('fc-field'); if(field) field.appendChild(el);
  S.cards.push({el:el,lane:lane,isC:isC,t:Date.now(),ms:ms,caught:false,missed:false});
}

function tick(){
  if(S.done||S.frozen) return;
  var now=Date.now(), h=fh(), catchTop=h-8-52;
  renderTimer();
  if(now-S.lastActivityTime>=INACTIVITY_MS){endGame(false);return;}
  S.cards=S.cards.filter(function(card){
    var y=-56+((now-card.t)/card.ms)*(h+80);
    card.el.style.top=Math.round(y)+'px';
    if(!card.caught&&!card.missed&&card.lane===S.lane){
      if(y>=catchTop-16&&y<=h){
        card.caught=true;
        var txt=card.el.textContent; card.el.remove();
        var field=document.getElementById('fc-field');
        S.lastActivityTime=now;
        if(card.isC){
          S.lastCorrectCaughtTime=now;
          var pop=document.createElement('div'); pop.className='fc-correct-pop';
          pop.textContent=txt; pop.style.left=lcx(S.lane)+'px'; pop.style.top=(catchTop-10)+'px';
          if(field) field.appendChild(pop); setTimeout(function(){pop.remove();},820);
          S.caught++; renderProg(); flashCatcher('good');
          showFeedback('✓ '+S.caught+' / '+WIN_COUNT,'good');
          hint('✅ Caught <span>'+S.caught+'/'+WIN_COUNT+'</span>');
          if(S.caught>=WIN_COUNT){endGame(true);return false;}
        } else {
          var ghost=document.createElement('div'); ghost.className='fc-wrong-flash';
          ghost.textContent=txt; ghost.style.left=lcx(S.lane)+'px'; ghost.style.top=(catchTop-10)+'px';
          if(field) field.appendChild(ghost); setTimeout(function(){ghost.remove();},1020);
          var lostIdx=S.caught-1;
          var starEl=lostIdx>=0?document.getElementById('fc-star-'+lostIdx):null;
          if(starEl){starEl.textContent='★';starEl.className='fc-star fc-star-lost';}
          setTimeout(function(){S.caught=Math.max(0,S.caught-1);renderProg();},400);
          flashCatcher('bad');
          hint('❌ Wrong catch — <span>lost 1 star (coral flash)</span>');
          S.frozen=true;
          setTimeout(function(){if(!S.done)S.frozen=false;},1020);
        }
        return false;
      }
    }
    if(y>h+20){card.missed=true;card.el.remove();return false;}
    return true;
  });
}

document.addEventListener('keydown',function(e){
  if(S.done) return;
  if(e.key==='ArrowLeft') {setLane(S.lane-1);e.preventDefault();}
  if(e.key==='ArrowRight'){setLane(S.lane+1);e.preventDefault();}
});
document.addEventListener('mousemove',function(e){
  if(S.done) return;
  var f=document.getElementById('fc-field'); if(!f) return;
  var r=f.getBoundingClientRect();
  setLane(Math.max(0,Math.min(2,Math.floor((e.clientX-r.left)/(r.width/3)))));
});

function restartMockup(){
  if(S.spawnT) clearInterval(S.spawnT);
  if(S.loopT)  clearInterval(S.loopT);
  initState(); buildHTML();
  hint('← → arrow keys or mouse to move · timer bar = inactivity');
  setTimeout(function(){spawn();S.spawnT=setInterval(spawn,1500);S.loopT=setInterval(tick,40);},60);
}
function skipToWin(){endGame(true);}
function skipToTimeout(){S.lastActivityTime=0;} // force immediate timeout on next tick

restartMockup();
</script>
</body>
</html>
